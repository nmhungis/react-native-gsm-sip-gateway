name: Build Android Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Clone Modules"
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git clone https://github.com/telon-org/react-native-tele.git
          git clone --recursive https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: "3. Setup Node 18 and Java 17"
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "4. Fix JSON"
        run: |
          cat << 'EOF' > fix_json.js
          const fs = require("fs");
          const fixJSON = (p) => {
            if(!fs.existsSync(p)) return;
            let txt = fs.readFileSync(p, "utf8");
            txt = txt.replace(/([\"\u007D\d]|true|false|null)\s*\n\s*(\")/g, "$1,\n$2");
            fs.writeFileSync(p, txt);
          };
          ["react-native-tele/package.json","react-native-sip2/package.json","react-native-replace-dialer/package.json"].forEach(fixJSON);
          
          const fixDeps = (p) => {
            if(!fs.existsSync(p)) return;
            let pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            const rep = (d) => {
              if(!d) return;
              for(let k in d) {
                if(["react-native-tele","react-native-sip2","react-native-replace-dialer"].includes(k)) d[k] = "file:../" + k;
                else if(typeof d[k]==="string" && d[k].includes("github.com")) {
                  if(k.includes("tele")) d[k] = "file:../react-native-tele";
                  if(k.includes("sip2")) d[k] = "file:../react-native-sip2";
                  if(k.includes("dialer")) d[k] = "file:../react-native-replace-dialer";
                }
                if(k==="react-native") d[k] = "0.68.2";
                if(k==="react") d[k] = "17.0.2";
              }
            };
            rep(pkg.dependencies); rep(pkg.devDependencies); rep(pkg.peerDependencies);
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2));
          };
          ["telon-gateway-app/package.json","react-native-tele/package.json","react-native-sip2/package.json","react-native-replace-dialer/package.json"].forEach(fixDeps);
          EOF
          node fix_json.js

      - name: "5. Install libraries"
        run: |
          cd telon-gateway-app
          rm -rf node_modules yarn.lock package-lock.json
          yarn install --ignore-engines

      - name: "6. Disable iOS config"
        run: |
          cd telon-gateway-app
          echo "module.exports = { dependencyConfig: () => ({}), projectConfig: () => ({}), findPodfilePaths: () => [] };" > node_modules/@react-native-community/cli-platform-ios/build/config/index.js

      - name: "7. Force AGP 8.6 Standards"
        run: |
          cd telon-gateway-app/android
          sed -i "s/gradle-.*-all\.zip/gradle-8.6-all.zip/g" gradle/wrapper/gradle-wrapper.properties
          echo "include ':sip2-android-core'" >> settings.gradle
          echo "project(':sip2-android-core').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-sip2/android/sip2-android-core')" >> settings.gradle
          
          cat << 'EOF' > fix_agp.js
          const fs = require("fs");
          const path = require("path");
          
          const dirs = [
              "../node_modules/react-native-tele/android", 
              "../node_modules/react-native-sip2/android", 
              "../node_modules/react-native-sip2/android/sip2-android-core",
              "../node_modules/react-native-replace-dialer/android"
          ];
          
          dirs.forEach(androidDir => {
              if (!fs.existsSync(androidDir)) fs.mkdirSync(androidDir, {recursive: true});
              let gradleFile = path.join(androidDir, "build.gradle");
              let pkgName = "one.telefon." + path.basename(path.dirname(androidDir)).replace(/[^a-zA-Z0-9]/g, "");
              if (androidDir.includes("sip2-android-core")) pkgName = "one.telefon.sip2.core";
              
              let manifestPath = path.join(androidDir, "src", "main", "AndroidManifest.xml");
              if (fs.existsSync(manifestPath)) {
                  let m = fs.readFileSync(manifestPath, "utf8").match(/package="([^"]+)"/);
                  if (m) pkgName = m[1];
              } else {
                  fs.mkdirSync(path.dirname(manifestPath), {recursive: true});
                  fs.writeFileSync(manifestPath, "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\" package=\"" + pkgName + "\"></manifest>");
              }
              
              if (!fs.existsSync(gradleFile)) {
                  fs.writeFileSync(gradleFile, "apply plugin: 'com.android.library'\nandroid {\n    namespace '" + pkgName + "'\n    compileSdkVersion 34\n    defaultConfig {\n        minSdkVersion 21\n        targetSdkVersion 34\n    }\n}\ndependencies {\n    implementation 'com.facebook.react:react-native:+'\n}\n");
              } else {
                  let gradle = fs.readFileSync(gradleFile, "utf8");
                  if (gradle.includes("android-library") && !gradle.includes("com.android.library")) gradle = gradle.replace(/apply\s+plugin:\s*['"]android-library['"]/g, "apply plugin: 'com.android.library'");
                  else if (!gradle.includes("com.android.library") && !gradle.includes("com.android.application")) gradle = "apply plugin: 'com.android.library'\n" + gradle;

                  if (!gradle.includes("namespace")) {
                      if (gradle.includes("android {")) gradle = gradle.replace(/android\s*\{/, "android {\n    namespace '" + pkgName + "'");
                      else gradle += "\nandroid {\n    namespace '" + pkgName + "'\n    compileSdkVersion 34\n}\n";
                  }
                  gradle = gradle.replace(/\bcompile\s+/g, "implementation ").replace(/\bcompile\(/g, "implementation(");
                  gradle = gradle.replace(/compileSdkVersion\s+\d+/g, "compileSdkVersion 34").replace(/targetSdkVersion\s+\d+/g, "targetSdkVersion 34").replace(/buildToolsVersion\s+['"][^'"]+['"]/g, "");
                  fs.writeFileSync(gradleFile, gradle);
              }
          });
          EOF
          node fix_agp.js

      - name: "8. CHUẨN ĐOÁN VÀ VÁ TẬN GỐC MÃ NGUỒN"
        run: |
          cd telon-gateway-app/android
          cat << 'EOF' > fix_java.js
          const fs = require("fs");
          const path = require("path");

          function walk(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              const list = fs.readdirSync(dir);
              list.forEach(file => {
                  file = path.join(dir, file);
                  const stat = fs.statSync(file);
                  if (stat && stat.isDirectory() && !file.includes("build") && !file.includes(".git")) {
                      results = results.concat(walk(file));
                  } else results.push(file);
              });
              return results;
          }

          const files = walk(".").concat(walk("../node_modules"));
          
          // 1. Chèn cờ bảo mật Android 12
          files.forEach(file => {
              if (file.endsWith("AndroidManifest.xml")) {
                  let content = fs.readFileSync(file, "utf8");
                  let changed = false;
                  content = content.replace(/<(activity|activity-alias|service|receiver)([^>]*)>/gi, (match, tag, attrs) => {
                      if (!attrs.includes("android:exported")) {
                          changed = true;
                          return "<" + tag + ' android:exported="true"' + attrs + ">";
                      }
                      return match;
                  });
                  if (changed) fs.writeFileSync(file, content);
              }
          });

          // 2. VÁ LỖI CỐT LÕI: Đổi tên miền thư mục và fix Enum Java
          files.forEach(file => {
              if (file.endsWith(".java")) {
                  let content = fs.readFileSync(file, "utf8");
                  let changed = false;

                  // Vá lỗi đổi domain: org.telon -> one.telefon
                  if (content.includes("org.telon.sip2")) {
                      content = content.replace(/org\.telon\.sip2/g, "one.telefon.sip2");
                      changed = true;
                  }

                  // Vá lỗi Enum của Java bị sai cú pháp constructor
                  if (content.includes("throw new IllegalArgumentException")) {
                      content = content.replace(/throw new IllegalArgumentException\("No enum " \+ (.+?)\.class \+ " with value " \+ swigValue\);/g, 
                      'throw new IllegalArgumentException();');
                      changed = true;
                  }

                  if (changed) fs.writeFileSync(file, content);
              }
          });

          // 3. Đẻ file Java giả mạo cho các PJSIP class bị tác giả bỏ quên
          const pjsuaDir = "../node_modules/react-native-sip2/android/src/main/java/org/pjsip/pjsua2";
          if (fs.existsSync(pjsuaDir)) {
              let stdTypes = new Set(["String", "Exception", "Object", "Class", "System", "Runtime", "Thread", "Override", "SuppressWarnings", "Math", "Integer", "Long", "Boolean", "Double", "Float", "Short", "Byte", "Character", "CharSequence", "Vector", "List", "ArrayList", "Map", "HashMap", "Set", "HashSet", "Iterator", "java", "lang", "util", "org", "pjsip", "pjsua2"]);
              let allWords = new Set();
              fs.readdirSync(pjsuaDir).forEach(file => {
                  if (file.endsWith(".java")) {
                      let text = fs.readFileSync(path.join(pjsuaDir, file), "utf8");
                      let words = text.match(/\b([A-Z][a-zA-Z0-9_]*|pjsua_[a-zA-Z0-9_]+)\b/g);
                      if (words) words.forEach(w => allWords.add(w));
                  }
              });

              allWords.forEach(w => {
                  if (!stdTypes.has(w)) {
                      let fpath = path.join(pjsuaDir, w + ".java");
                      if (!fs.existsSync(fpath)) {
                          let ext = w.endsWith("Exception") ? " extends java.lang.Exception" : "";
                          fs.writeFileSync(fpath, `package org.pjsip.pjsua2;\npublic class ${w}${ext} {\n  public ${w}(long cPtr, boolean cMemoryOwn) {}\n  public ${w}() {}\n  public static long getCPtr(${w} obj) { return 0; }\n  public int swigValue() { return 0; }\n  public static ${w} swigToEnum(int v) { return new ${w}(); }\n}\n`);
                      }
                  }
              });
          }
          EOF
          node fix_java.js
          
          echo "android.defaults.buildfeatures.buildconfig=true" >> gradle.properties
          echo "android.nonTransitiveRClass=false" >> gradle.properties

      - name: "9. Build APK"
        run: |
          cd telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: "10. Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
