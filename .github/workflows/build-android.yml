name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Tai Module va Va loi JSON
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          
          find . -name "yarn.lock" -type f -delete
          find . -name "package-lock.json" -type f -delete
          
          python3 -c '
          import re, glob, os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "package.json":
                      filepath = os.path.join(root, file)
                      with open(filepath, "r") as f: data = f.read()
                      data = re.sub(r"([\x22\]\}\d]|true|false|null)\s*\n\s*(\x22)", r"\1,\n\2", data)
                      with open(filepath, "w") as f: f.write(data)
          '

      - name: 3. Ep Ha Cap React Native
        run: |
          for file in $(find . -name "package.json" -type f); do
            jq '
              def fix(obj):
                if obj == null then null
                else
                  with_entries(
                    if .value | type == "string" and test("telon-org/react-native-tele") then .value = "file:../react-native-tele"
                    elif .value | type == "string" and test("telon-org/react-native-sip2") then .value = "file:../react-native-sip2"
                    elif .value | type == "string" and test("telon-org/react-native-replace-dialer") then .value = "file:../react-native-replace-dialer"
                    elif .key == "react-native" then .value = "0.68.2"
                    elif .key == "react" then .value = "17.0.2"
                    else . end
                  )
                end;
              (if .dependencies != null then .dependencies = fix(.dependencies) else . end) |
              (if .devDependencies != null then .devDependencies = fix(.devDependencies) else . end) |
              (if .peerDependencies != null then .peerDependencies = fix(.peerDependencies) else . end)
            ' "$file" > tmp.json && mv tmp.json "$file"
          done

      - name: 4. Setup Node & Java
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 5. Cai dat thu vien
        run: |
          cd telon-gateway-app
          yarn install --ignore-engines

      - name: 6. Build APK
        run: |
          cd telon-gateway-app/android
          sed -i 's/gradle-.*-all\.zip/gradle-7.4.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 7. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
