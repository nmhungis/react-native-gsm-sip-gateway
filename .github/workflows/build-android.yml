name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Thiết lập Node 16 & Java 11 (Combo chuẩn đồ cổ)
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 3. Vá lỗi JSON & Tạo mồi nhử Git Local
        run: |
          # Kéo 3 module vệ tinh về máy ảo
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

          # Chèn dấu phẩy bị thiếu để vá lỗi JSON
          python3 -c '
          import re, glob
          for file in glob.glob("react-native-*/package.json"):
              with open(file, "r") as f: data = f.read()
              data = re.sub(r"([\x22\]\}\d]|true|false|null)\s*\n\s*(\x22)", r"\1,\n\2", data)
              with open(file, "w") as f: f.write(data)
          '

          # Đóng gói lại thành kho Git nội bộ để lát nữa Yarn dùng
          for d in react-native-tele react-native-sip2 react-native-replace-dialer; do
            cd $d
            git config user.name "AutoFix"
            git config user.email "fix@example.com"
            git add package.json
            git commit -m "Fixed JSON syntax" || true
            cd ..
          done

      - name: 4. Cài đặt Dependencies (Tuyệt kỹ đánh tráo Git)
        run: |
          # Bẻ lái toàn bộ truy vấn tải 3 module lỗi từ GitHub về thư mục Local đã vá
          for d in react-native-tele react-native-sip2 react-native-replace-dialer; do
            git config --global url."file://$GITHUB_WORKSPACE/$d".insteadOf "ssh://git@github.com/telon-org/$d.git"
            git config --global url."file://$GITHUB_WORKSPACE/$d".insteadOf "git+ssh://git@github.com/telon-org/$d.git"
            git config --global url."file://$GITHUB_WORKSPACE/$d".insteadOf "https://github.com/telon-org/$d.git"
            git config --global url."file://$GITHUB_WORKSPACE/$d".insteadOf "git@github.com:telon-org/$d.git"
          done

          cd telon-gateway-app

          # BƯỚC SỐNG CÒN: TUYỆT ĐỐI GIỮ NGUYÊN yarn.lock, chỉ cài đặt theo đúng khuôn khổ
          rm -f package-lock.json node_modules
          yarn install --frozen-lockfile || yarn install

      - name: 5. Hạ cấp Gradle & Biên dịch (Gradle 6.9 khớp RN cũ)
        run: |
          cd telon-gateway-app/android
          # Ép lùi Gradle về bản 6.9 để tương thích mượt mà với React Native thời kỳ này
          sed -i 's/gradle-.*-all\.zip/gradle-6.9-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 6. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
