name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn chính
        uses: actions/checkout@v4

      - name: 1.1 Tải module vệ tinh & Vá lỗi JSON
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          
          # Tự động chèn dấu phẩy bị thiếu vào file JSON của tác giả
          python3 -c '
          import re, glob
          for file in glob.glob("react-native-*/package.json"):
              with open(file, "r") as f: data = f.read()
              data = re.sub(r"([\x22\]\}\d]|true|false|null)\s*\n\s*(\x22)", r"\1,\n\2", data)
              with open(file, "w") as f: f.write(data)
          '

      - name: 2. Thiết lập Node 16 & Java 11 (Combo chuẩn đồ cổ)
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 3. Tiêm Vaccine (Khóa cứng phiên bản, chống Ngựa Gỗ)
        run: |
          # Ép Git dùng HTTPS thay vì SSH
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          
          cd telon-gateway-app
          
          # Lôi chính xác số phiên bản React Native mà ứng dụng gốc đang dùng (VD: ^0.63.4)
          RN_VER=$(jq -r '.dependencies["react-native"]' package.json)
          # Nếu tác giả để trống, tự động chốt bản 0.66.0 an toàn
          if [ "$RN_VER" == "null" ] || [ -z "$RN_VER" ] || [ "$RN_VER" == "*" ]; then RN_VER="^0.66.0"; fi
          echo "Bản React Native chốt sổ: $RN_VER"
          
          # BƯỚC CỐT LÕI: Đè phiên bản cũ này vào 3 module vệ tinh để chúng không được phép tải bản mới
          for d in tele sip2 replace-dialer; do
            if [ -f "../react-native-$d/package.json" ]; then
              jq ".dependencies[\"react-native\"] = \"$RN_VER\" | .peerDependencies[\"react-native\"] = \"$RN_VER\"" ../react-native-$d/package.json > tmp.json && mv tmp.json ../react-native-$d/package.json
            fi
          done
          
          # Trỏ 3 module về local và thiết lập "Resolutions" khóa chặt mọi phiên bản React Native trên toàn hệ thống
          jq ".resolutions[\"react-native\"] = \"$RN_VER\" | \
              .dependencies[\"react-native-tele\"] = \"file:../react-native-tele\" | \
              .dependencies[\"react-native-sip2\"] = \"file:../react-native-sip2\" | \
              .dependencies[\"react-native-replace-dialer\"] = \"file:../react-native-replace-dialer\"" \
              package.json > package.tmp.json
          mv package.tmp.json package.json
          
          # Xóa toàn bộ tàn dư khóa cũ, bắt Yarn cài lại đúng phiên bản đã bị ép
          rm -f yarn.lock package-lock.json
          yarn install

      - name: 4. Hạ cấp Gradle về 7.4.2 (Ép tương thích)
        run: |
          cd telon-gateway-app/android
          sed -i 's/gradle-.*-all\.zip/gradle-7.4.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: 5. Build file APK Debug
        run: |
          cd telon-gateway-app/android
          ./gradlew assembleDebug

      - name: 6. Đóng gói Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
