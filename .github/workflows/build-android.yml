name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn
        uses: actions/checkout@v4

      - name: 1.1 Tải module vệ tinh & Vá lỗi JSON của tác giả
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          python3 -c '
          import re, glob
          for file in glob.glob("react-native-*/package.json"):
              with open(file, "r") as f: data = f.read()
              data = re.sub(r"([\x22\]\}\d]|true|false|null)\s*\n\s*(\x22)", r"\1,\n\2", data)
              with open(file, "w") as f: f.write(data)
          '

      - name: 2. Thiết lập Node 16 & Java 11 (Combo chuẩn cho RN đồ cổ)
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 3. Cứu rỗi Yarn Lock (Tuyệt đối không xóa)
        run: |
          cd telon-gateway-app
          
          # Cốt lõi: Sửa trực tiếp link SSH thành HTTPS trong file lock
          sed -i 's/git+ssh:\/\/git@github.com\//https:\/\/github.com\//g' yarn.lock
          sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' yarn.lock
          sed -i 's/git@github.com:/https:\/\/github.com\//g' yarn.lock

          # Trỏ 3 module sang thư mục local đã vá lỗi
          jq ".dependencies[\"react-native-tele\"] = \"file:../react-native-tele\" | .dependencies[\"react-native-sip2\"] = \"file:../react-native-sip2\" | .dependencies[\"react-native-replace-dialer\"] = \"file:../react-native-replace-dialer\"" package.json > package.tmp.json
          mv package.tmp.json package.json

          # Cài đặt: Lần này Yarn bắt buộc phải tải React Native bản cũ kỹ có chứa react.gradle
          yarn install

      - name: 4. Hạ cấp Gradle về 7.4.2 (Ép tương thích)
        run: |
          cd telon-gateway-app/android
          # Vượt quyền tác giả: Ép file wrapper dùng Gradle 7.4.2 để khớp với Java 11 và RN cũ
          sed -i 's/gradle-.*-all\.zip/gradle-7.4.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: 5. Build file APK Debug
        run: |
          cd telon-gateway-app/android
          ./gradlew assembleDebug

      - name: 6. Đóng gói Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
