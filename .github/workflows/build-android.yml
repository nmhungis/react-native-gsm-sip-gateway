name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn
        uses: actions/checkout@v4

      - name: 1.1 Tải module vệ tinh & Vá lỗi JSON nội bộ
        run: |
          rm -f package.json package-lock.json yarn.lock || true

          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

          python3 -c '
          import re, glob
          for file in glob.glob("react-native-*/package.json"):
              with open(file, "r") as f: data = f.read()
              data = re.sub(r"([\x22\]\}\d]|true|false|null)\s*\n\s*(\x22)", r"\1,\n\2", data)
              with open(file, "w") as f: f.write(data)
          '

          for d in react-native-tele react-native-sip2 react-native-replace-dialer; do
            cd $d
            git config user.name "AutoFix"
            git config user.email "fix@example.com"
            git commit -am "Fixed JSON syntax" || true
            cd ..
          done

      - name: 2. Thiết lập Node 16 & Java 11
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 3. Tuyệt Kỹ Đánh tráo đường dẫn Git
        run: |
          git config --global url."file://$GITHUB_WORKSPACE/react-native-tele".insteadOf "ssh://git@github.com/telon-org/react-native-tele.git"
          git config --global url."file://$GITHUB_WORKSPACE/react-native-sip2".insteadOf "ssh://git@github.com/telon-org/react-native-sip2.git"
          git config --global url."file://$GITHUB_WORKSPACE/react-native-replace-dialer".insteadOf "ssh://git@github.com/telon-org/react-native-replace-dialer.git"

      - name: 4. Cài đặt chuẩn xác nguyên bản
        run: |
          cd telon-gateway-app
          rm -f yarn.lock node_modules
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: 5. Hạ cấp Gradle về 7.4.2
        run: |
          cd telon-gateway-app/android
          sed -i 's/gradle-.*-all\.zip/gradle-7.4.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: 6. Build file APK Debug
        run: |
          cd telon-gateway-app/android
          ./gradlew assembleDebug

      - name: 7. Đóng gói Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
