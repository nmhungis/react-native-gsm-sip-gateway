name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn chính
        uses: actions/checkout@v4

      - name: 1.1 Kéo module vệ tinh về đúng vị trí gốc
        run: |
          # Phải kéo về thư mục gốc, ngang hàng với telon-gateway-app
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: 1.2 Vá lỗi thiếu dấu phẩy JSON của tác giả
        run: |
          python3 -c '
          import re, glob
          for file in glob.glob("react-native-*/package.json"):
              with open(file, "r") as f:
                  data = f.read()
              data = re.sub(r"([\x22\]\}\d]|true|false|null)\s*\n\s*(\x22)", r"\1,\n\2", data)
              with open(file, "w") as f:
                  f.write(data)
          '

      - name: 2. Thiết lập Node.js (Về v16 để hợp RN cũ)
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: 3. Thiết lập Java (JDK 17 tương thích Gradle 8.14)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Cài đặt thư viện KHÔNG phá vỡ cấu trúc gốc
        run: |
          # Ép Git dùng HTTPS thay vì SSH để tránh lỗi Permission Denied
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          
          cd telon-gateway-app
          
          # Xóa yarn.lock (nếu có) để tránh xung đột
          rm -f yarn.lock
          
          # Dùng npm ci (Clean Install) để ép cài đặt chuẩn xác 100% theo package-lock.json gốc
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: 5. Phân quyền thực thi cho Gradle
        run: |
          cd telon-gateway-app/android
          chmod +x gradlew

      - name: 6. Build file APK Debug
        run: |
          cd telon-gateway-app/android
          ./gradlew assembleDebug

      - name: 7. Đóng gói Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
