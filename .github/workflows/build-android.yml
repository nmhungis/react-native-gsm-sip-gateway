- name: 7. Nâng cấp Gradle & Tiêm Namespace Tuyệt Đối (Node.js)
        run: |
          cd telon-gateway-app/android
          sed -i "s/gradle-.*-all\.zip/gradle-8.6-all.zip/g" gradle/wrapper/gradle-wrapper.properties
          
          # Nối cầu cho module ngầm của SIP2
          echo "include ':sip2-android-core'" >> settings.gradle
          echo "project(':sip2-android-core').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-sip2/android/sip2-android-core')" >> settings.gradle
          
          # TUYỆT KỸ VÁ LỖ HỔNG: Dùng Node.js xuyên thủng rào cản Symlink, tiêm trực tiếp Namespace
          node -e '
          const fs = require("fs");
          const path = require("path");
          
          // Đi thẳng ra ngoài thư mục gốc để quét
          const dirs = ["../../react-native-tele", "../../react-native-sip2", "../../react-native-replace-dialer"];
          
          function walk(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              const list = fs.readdirSync(dir);
              list.forEach(file => {
                  file = path.join(dir, file);
                  const stat = fs.statSync(file);
                  if (stat && stat.isDirectory()) results = results.concat(walk(file));
                  else results.push(file);
              });
              return results;
          }
          
          dirs.forEach(dir => {
              walk(dir).forEach(file => {
                  if (file.endsWith("AndroidManifest.xml")) {
                      const manifest = fs.readFileSync(file, "utf8");
                      const match = manifest.match(/package="([^"]+)"/);
                      if (match) {
                          const pkg = match[1];
                          const gradleFile = file.replace(/src\/main\/AndroidManifest\.xml$/, "build.gradle");
                          if (fs.existsSync(gradleFile)) {
                              let gradle = fs.readFileSync(gradleFile, "utf8");
                              if (!gradle.includes("namespace")) {
                                  // Tiêm namespace vào ngay dưới thẻ android {
                                  gradle = gradle.replace(/android\s*\{/, "android {\n    namespace '\''" + pkg + "'\''");
                                  fs.writeFileSync(gradleFile, gradle);
                                  console.log("Đã vá xong Namespace cho: " + pkg);
                              }
                          }
                      }
                  }
              });
          });
          '
          
          chmod +x gradlew
          ./gradlew assembleDebug
