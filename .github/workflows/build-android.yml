name: Build Android Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Clone Modules
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone --recursive https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: 3. Setup Node 18 and Java 17
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Phẫu thuật JSON (An Toàn)
        run: |
          cat << 'EOF' > fix_json.js
          const fs = require("fs");
          const fixJSON = (p) => {
            if(!fs.existsSync(p)) return;
            let txt = fs.readFileSync(p, "utf8");
            txt = txt.replace(/([\"\u007D\d]|true|false|null)\s*\n\s*(\")/g, "$1,\n$2");
            fs.writeFileSync(p, txt);
          };
          ["react-native-tele/package.json","react-native-sip2/package.json","react-native-replace-dialer/package.json"].forEach(fixJSON);
          
          const fixDeps = (p) => {
            if(!fs.existsSync(p)) return;
            let pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            const rep = (d) => {
              if(!d) return;
              for(let k in d) {
                if(["react-native-tele","react-native-sip2","react-native-replace-dialer"].includes(k)) d[k] = "file:../" + k;
                else if(typeof d[k]==="string" && d[k].includes("github.com")) {
                  if(k.includes("tele")) d[k] = "file:../react-native-tele";
                  if(k.includes("sip2")) d[k] = "file:../react-native-sip2";
                  if(k.includes("dialer")) d[k] = "file:../react-native-replace-dialer";
                }
                if(k==="react-native") d[k] = "0.68.2";
                if(k==="react") d[k] = "17.0.2";
              }
            };
            rep(pkg.dependencies); rep(pkg.devDependencies); rep(pkg.peerDependencies);
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2));
          };
          ["telon-gateway-app/package.json","react-native-tele/package.json","react-native-sip2/package.json","react-native-replace-dialer/package.json"].forEach(fixDeps);
          EOF
          node fix_json.js

      - name: 5. Cài đặt thư viện
        run: |
          cd telon-gateway-app
          rm -rf node_modules yarn.lock package-lock.json
          yarn install --ignore-engines

      - name: 6. Tiêm thuốc mê iOS
        run: |
          cd telon-gateway-app
          echo "module.exports = { dependencyConfig: () => ({}), projectConfig: () => ({}), findPodfilePaths: () => [] };" > node_modules/@react-native-community/cli-platform-ios/build/config/index.js

      - name: 7. BÀN TAY SẮT: Cưỡng chế mọi module lên chuẩn AGP 8.6
        run: |
          cd telon-gateway-app/android
          sed -i "s/gradle-.*-all\.zip/gradle-8.6-all.zip/g" gradle/wrapper/gradle-wrapper.properties
          
          echo "include ':sip2-android-core'" >> settings.gradle
          echo "project(':sip2-android-core').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-sip2/android/sip2-android-core')" >> settings.gradle
          
          # KỊCH BẢN ĐẠI TU: Bơm code thẳng tay nếu các module vệ tinh bị trống rỗng!
          cat << 'EOF' > fix_agp.js
          const fs = require("fs");
          const path = require("path");
          
          const dirs = [
              "../node_modules/react-native-tele/android", 
              "../node_modules/react-native-sip2/android", 
              "../node_modules/react-native-sip2/android/sip2-android-core",
              "../node_modules/react-native-replace-dialer/android"
          ];
          
          dirs.forEach(androidDir => {
              // 1. Nếu thiếu hẳn thư mục android -> Tạo luôn
              if (!fs.existsSync(androidDir)) {
                  fs.mkdirSync(androidDir, {recursive: true});
              }
              
              let gradleFile = path.join(androidDir, "build.gradle");
              let pkgName = "one.telefon." + path.basename(path.dirname(androidDir)).replace(/[^a-zA-Z0-9]/g, "");
              if (androidDir.includes("sip2-android-core")) pkgName = "one.telefon.sip2.core";
              
              let manifestPath = path.join(androidDir, "src", "main", "AndroidManifest.xml");
              
              // 2. Nếu thiếu Manifest -> Đẻ file Manifest
              if (fs.existsSync(manifestPath)) {
                  let manifest = fs.readFileSync(manifestPath, "utf8");
                  let m = manifest.match(/package="([^"]+)"/);
                  if (m) pkgName = m[1];
              } else {
                  fs.mkdirSync(path.dirname(manifestPath), {recursive: true});
                  fs.writeFileSync(manifestPath, `<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="${pkgName}"></manifest>`);
              }
              
              // 3. Nếu thiếu hoặc có Gradle -> Ép kiểu lên AGP 8.6
              if (!fs.existsSync(gradleFile)) {
                  let content = `
                  apply plugin: 'com.android.library'
                  android {
                      namespace '${pkgName}'
                      compileSdkVersion 34
                      defaultConfig {
                          minSdkVersion 21
                          targetSdkVersion 34
                      }
                  }
                  dependencies {
                      implementation "com.facebook.react:react-native:+"
                  }
                  `;
                  fs.writeFileSync(gradleFile, content);
                  console.log("TẠO MỚI CẤU HÌNH CHO: " + gradleFile);
              } else {
                  let gradle = fs.readFileSync(gradleFile, "utf8");
                  
                  if (gradle.includes("android-library") && !gradle.includes("com.android.library")) {
                      gradle = gradle.replace(/apply\s+plugin:\s*['"]android-library['"]/g, "apply plugin: 'com.android.library'");
                  } else if (!gradle.includes("com.android.library") && !gradle.includes("com.android.application")) {
                      gradle = "apply plugin: 'com.android.library'\n" + gradle;
                  }

                  if (!gradle.includes("namespace")) {
                      if (gradle.includes("android {")) {
                          gradle = gradle.replace(/android\s*\{/, "android {\n    namespace '" + pkgName + "'");
                      } else {
                          gradle += `\nandroid {\n    namespace '${pkgName}'\n    compileSdkVersion 34\n}\n`;
                      }
                  }

                  gradle = gradle.replace(/\bcompile\s+/g, "implementation ");
                  gradle = gradle.replace(/\bcompile\(/g, "implementation(");
                  
                  gradle = gradle.replace(/compileSdkVersion\s+\d+/g, "compileSdkVersion 34");
                  gradle = gradle.replace(/targetSdkVersion\s+\d+/g, "targetSdkVersion 34");
                  gradle = gradle.replace(/buildToolsVersion\s+['"][^'"]+['"]/g, "");

                  fs.writeFileSync(gradleFile, gradle);
                  console.log("ÉP KIỂU THÀNH CÔNG CHO: " + gradleFile);
              }
          });
          EOF
          node fix_agp.js
          
          # Tấm khiên chống sập cho mã nguồn cũ
          echo "android.defaults.buildfeatures.buildconfig=true" >> gradle.properties
          echo "android.nonTransitiveRClass=false" >> gradle.properties
          
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
