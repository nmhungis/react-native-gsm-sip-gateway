name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn chính
        uses: actions/checkout@v4

      - name: 1.1 Tải các module vệ tinh (Local Folders)
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: 2. Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: 3. Thiết lập Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 4. Cài đặt thư viện bằng Yarn (Link Local)
        run: |
          cd telon-gateway-app
          rm -f yarn.lock package-lock.json
          
          # Dùng công cụ jq chuyên dụng để sửa file package.json an toàn
          # Chuyển hướng 3 module bị lỗi sang dùng thư mục đã tải sẵn ở bước 1.1
          jq '.dependencies |= with_entries(
            if (.value | type == "string") and (.value | contains("react-native-tele")) then .value = "file:../react-native-tele"
            elif (.value | type == "string") and (.value | contains("react-native-sip2")) then .value = "file:../react-native-sip2"
            elif (.value | type == "string") and (.value | contains("react-native-replace-dialer")) then .value = "file:../react-native-replace-dialer"
            else . end
          )' package.json > package.tmp.json
          
          mv package.tmp.json package.json
          
          # Tiến hành cài đặt (Lần này Yarn sẽ chỉ đọc file trên ổ cứng, không cần lên mạng lấy 3 module kia)
          yarn install

      - name: 5. Phân quyền thực thi cho Gradle
        run: |
          cd telon-gateway-app/android
          chmod +x gradlew

      - name: 6. Build file APK Debug
        run: |
          cd telon-gateway-app/android
          ./gradlew assembleDebug

      - name: 7. Đóng gói Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
