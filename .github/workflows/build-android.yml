name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn chính
        uses: actions/checkout@v4

      - name: 1.1 Tải các module vệ tinh
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: 2. Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: 3. Thiết lập Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 3.5 Ép Git sử dụng HTTPS thay vì SSH (Sửa lỗi Public Key)
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: 4. Cài đặt thư viện Node bằng Yarn
        run: |
          cd telon-gateway-app
          rm -f package-lock.json # Xóa file rác gây xung đột package manager
          yarn install

      - name: 5. Phân quyền thực thi cho Gradle
        run: |
          cd telon-gateway-app/android
          chmod +x gradlew

      - name: 6. Build file APK Debug
        run: |
          cd telon-gateway-app/android
          ./gradlew assembleDebug

      - name: 7. Đóng gói Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
