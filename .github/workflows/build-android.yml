name: Build Android Debug APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn chính
        uses: actions/checkout@v4

      - name: 2. Clone 3 Module Vệ Tinh
        run: |
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: 3. Thiết lập Node 18 & Java 11
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 4. Phẫu thuật JSON - Ép phiên bản và vá đường dẫn
        run: |
          node -e '
          const fs = require("fs");
          
          const fixSyntax = (path) => {
            if (fs.existsSync(path)) {
              let data = fs.readFileSync(path, "utf8");
              data = data.replace(/([\"\}\d]|true|false|null)\s*\n\s*(\")/g, "$1,\n$2");
              fs.writeFileSync(path, data);
            }
          };
          fixSyntax("react-native-tele/package.json");
          fixSyntax("react-native-sip2/package.json");
          fixSyntax("react-native-replace-dialer/package.json");

          const updateDeps = (path) => {
            if (fs.existsSync(path)) {
              let pkg = JSON.parse(fs.readFileSync(path, "utf8"));
              const targets = ["react-native-tele", "react-native-sip2", "react-native-replace-dialer"];
              
              const replaceLinks = (deps) => {
                if (!deps) return;
                for (let key in deps) {
                  if (targets.includes(key)) {
                    deps[key] = "file:../" + key;
                  } else if (typeof deps[key] === "string" && deps[key].includes("github.com/telon-org")) {
                    if (key.includes("tele")) deps[key] = "file:../react-native-tele";
                    if (key.includes("sip2")) deps[key] = "file:../react-native-sip2";
                    if (key.includes("dialer")) deps[key] = "file:../react-native-replace-dialer";
                  }
                  
                  if (key === "react-native") deps[key] = "0.68.2";
                  if (key === "react") deps[key] = "17.0.2";
                }
              };
              
              replaceLinks(pkg.dependencies);
              replaceLinks(pkg.devDependencies);
              replaceLinks(pkg.peerDependencies);
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
            }
          };
          
          updateDeps("telon-gateway-app/package.json");
          updateDeps("react-native-tele/package.json");
          updateDeps("react-native-sip2/package.json");
          updateDeps("react-native-replace-dialer/package.json");
          '

      - name: 5. Cài đặt thư viện
        run: |
          cd telon-gateway-app
          rm -rf node_modules yarn.lock package-lock.json
          yarn install --ignore-engines

      - name: 6. TUYỆT KỸ: "Tiêm thuốc mê" iOS (Chống Crash CLI)
        run: |
          cd telon-gateway-app
          # Ghi đè module quét iOS thành một hàm rỗng để chặn đứng lỗi TypeError
          echo "module.exports = { dependencyConfig: () => ({}), projectConfig: () => ({}), findPodfilePaths: () => [] };" > node_modules/@react-native-community/cli-platform-ios/build/config/index.js

      - name: 7. Hạ cấp Gradle & Biên dịch APK
        run: |
          cd telon-gateway-app/android
          sed -i "s/gradle-.*-all\.zip/gradle-7.4.2-all.zip/g" gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: telon-gateway-app/android/app/build/outputs/apk/debug/app-debug.apk
